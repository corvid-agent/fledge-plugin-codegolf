name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint bin/codegolf
        run: shellcheck bin/codegolf

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Run plugin tests
        run: bash tests/run_tests.sh

  validate-challenges:
    name: Validate Challenges
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check challenge files
        run: |
          status=0
          for f in challenges/*.toml; do
            id=$(basename "$f" .toml)
            # Ensure required fields
            grep -q '^name' "$f" || { echo "FAIL: $f missing name"; status=1; }
            grep -q '^difficulty' "$f" || { echo "FAIL: $f missing difficulty"; status=1; }
            grep -q '^description' "$f" || { echo "FAIL: $f missing description"; status=1; }
            # Ensure test cases exist
            test_dir="challenges/tests/$id"
            if [ ! -d "$test_dir" ]; then
              echo "FAIL: $f has no test directory at $test_dir"
              status=1
            else
              count=$(find "$test_dir" -name '*.in' | wc -l)
              if [ "$count" -eq 0 ]; then
                echo "FAIL: $test_dir has no .in test files"
                status=1
              fi
            fi
          done
          exit $status
